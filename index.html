<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />

  <title>مركز إدارة الثروة الشخصية</title>

  <script>
    const PWC_DEV_VERSION = Date.now();
    document.write(`<link rel="stylesheet" href="css/style.css?v=${PWC_DEV_VERSION}" />`);
  </script>
</head>

<body>
  <div id="appShell">

    <header class="topBrand">
      <div class="brandIcon">💰</div>

      <div class="brandText">
        <h1>مركز إدارة الثروة الشخصية</h1>
        <p>Personal Wealth Center</p>
      </div>
    </header>

    <main id="app">
      <section id="home" class="page active"></section>
      <section id="portfolio" class="page"></section>
      <section id="spending" class="page"></section>
      <section id="assets" class="page"></section>
      <section id="reports" class="page"></section>
      <section id="settings" class="page"></section>
      <section id="quick" class="page"></section>
    </main>

  </div>

  <nav class="bottomNav bottom-nav" aria-label="التنقل الرئيسي">
    <button class="navBtn active" data-page="home" onclick="WC.go('home', this)">
      <span>🏠</span>
      <small>الرئيسية</small>
    </button>

    <button class="navBtn" data-page="portfolio" onclick="WC.go('portfolio', this)">
      <span>📈</span>
      <small>المحفظة</small>
    </button>

    <button class="navBtn" data-page="spending" onclick="WC.go('spending', this)">
      <span>💳</span>
      <small>المصروفات</small>
    </button>

    <button class="navBtn" data-page="assets" onclick="WC.go('assets', this)">
      <span>💎</span>
      <small>الثروة</small>
    </button>

    <button class="navBtn" data-page="reports" onclick="WC.go('reports', this)">
      <span>📊</span>
      <small>التحليل</small>
    </button>

    <button class="navBtn" data-page="settings" onclick="WC.go('settings', this)">
      <span>⚙️</span>
      <small>الإعدادات</small>
    </button>
  </nav>

  <script>
    [
      "js/config.js",
      "js/utils.js",
      "js/events.js",
      "js/store.js",
      "js/ui.js",
      "js/app.js",
      "js/home.js",
      "js/portfolio.js",
      "js/spending.js",
      "js/assets.js",
      "js/reports.js",
      "js/settings.js",
      "js/quick.js"
    ].forEach(src => {
      document.write(`<script src="${src}?v=${PWC_DEV_VERSION}"><\/script>`);
    });
  </script>
</body>
</html>
