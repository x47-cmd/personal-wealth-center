<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>مركز إدارة الثروة الشخصية</title>

  <link rel="stylesheet" href="css/style.css?v=16" />

  <style>
    body{
      padding-bottom:110px !important;
    }

    #appShell{
      padding-bottom:110px !important;
    }

    .bottomNav,
    .bottom-nav{
      position:fixed !important;
      left:12px !important;
      right:12px !important;
      bottom:0 !important;
      height:92px !important;
      display:grid !important;
      grid-template-columns:repeat(6,1fr) !important;
      align-items:start !important;
      gap:4px !important;
      padding:7px 6px calc(7px + env(safe-area-inset-bottom)) !important;
      background:#fff !important;
      border:1px solid #edf0f5 !important;
      border-bottom:none !important;
      border-radius:25px 25px 0 0 !important;
      box-shadow:0 -10px 30px rgba(15,23,42,.10) !important;
      overflow:hidden !important;
      z-index:999999 !important;
    }
  </style>
</head>

<body>
  <div id="appShell">
    <header class="appHeader">
      <div>
        <span class="appBadge">Wealth Center</span>
        <h1>مركز إدارة الثروة الشخصية</h1>
        <p>منصة موحدة لإدارة المحفظة، المصروفات، الثروة، التحليل، والأهداف المالية.</p>
      </div>
    </header>

    <main id="app">
      <section id="home" class="page active"></section>
      <section id="portfolio" class="page"></section>
      <section id="spending" class="page"></section>
      <section id="assets" class="page"></section>
      <section id="reports" class="page"></section>
      <section id="settings" class="page"></section>
      <section id="quick" class="page"></section>
    </main>
  </div>

  <nav class="bottomNav bottom-nav" aria-label="التنقل الرئيسي">
    <button class="navBtn active" data-page="home" onclick="WC.go('home', this)">
      <span>🏠</span><small>الرئيسية</small>
    </button>

    <button class="navBtn" data-page="portfolio" onclick="WC.go('portfolio', this)">
      <span>📈</span><small>المحفظة</small>
    </button>

    <button class="navBtn" data-page="spending" onclick="WC.go('spending', this)">
      <span>💳</span><small>المصروفات</small>
    </button>

    <button class="navBtn" data-page="assets" onclick="WC.go('assets', this)">
      <span>💎</span><small>الثروة</small>
    </button>

    <button class="navBtn" data-page="reports" onclick="WC.go('reports', this)">
      <span>📊</span><small>التحليل</small>
    </button>

    <button class="navBtn" data-page="settings" onclick="WC.go('settings', this)">
      <span>⚙️</span><small>الإعدادات</small>
    </button>
  </nav>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/events.js"></script>
  <script src="js/store.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <script src="js/home.js"></script>
  <script src="js/portfolio.js"></script>
  <script src="js/spending.js"></script>
  <script src="js/assets.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/quick.js"></script>
</body>
</html>
